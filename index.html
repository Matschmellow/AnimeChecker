<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyAniList - Dashboard</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        
        <header class="app-header">
            <h1>MyAniList</h1>
            <p class="subtitle">Dein persönliches Anime-Streaming-Dashboard</p>
        </header>

        <div class="control-panel">
            <div class="input-section">
                <div class="input-wrapper">
                    <input type="text" id="animeName" placeholder="Anime suchen oder eintippen..." onkeyup="showSuggestions()" autocomplete="off">
                    <div id="autocompleteList" class="autocomplete-list"></div>
                </div>
                <button class="btn-primary" onclick="addAnime()">Hinzufügen</button>
            </div>

            <!-- NEU: Sleeke Sortier-Pillen statt Dropdown -->
            <div class="sort-section">
                <div class="sort-pills">
                    <button class="sort-pill" onclick="changeSort('last_active')" id="sort_last_active">🕒 Aktiv</button>
                    <button class="sort-pill" onclick="changeSort('progress_percent')" id="sort_progress_percent">📈 % Fortschritt</button>
                    <button class="sort-pill" onclick="changeSort('date_desc')" id="sort_date_desc">✨ Neu</button>
                    <button class="sort-pill" onclick="changeSort('name_asc')" id="sort_name_asc">🔤 A-Z</button>
                </div>
            </div>

            <div class="backup-section" style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn-primary" style="background-color: var(--border-color); padding: 10px 15px; font-size: 13px;" onclick="exportData()">💾 Exportieren</button>
                <label class="btn-primary" style="background-color: var(--border-color); padding: 10px 15px; font-size: 13px; cursor: pointer; margin: 0;">
                    📂 Importieren
                    <input type="file" accept=".json" style="display: none;" onchange="importData(event)">
                </label>
            </div>
        </div>

        <div class="main-tabs-container">
            <button id="tab-active" class="main-tab active" onclick="switchMainTab('active')">Aktuell</button>
            <button id="tab-completed" class="main-tab" onclick="switchMainTab('completed')">Abgeschlossen</button>
        </div>

        <main>
            <div id="animeGrid" class="anime-grid">
                <!-- Anime Cards werden hier per JS generiert -->
            </div>
        </main>

        <section class="recommendations-container">
            <h2>Vorschläge für dich</h2>
            <div id="recommendationsGrid" class="anime-grid">
                <!-- Empfehlungen werden hier per JS generiert -->
            </div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
