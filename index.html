<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyAniList - Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Meine Anime Liste</h1>
        
        <div class="input-section">
            <div class="input-wrapper">
                <input type="text" id="animeName" placeholder="Anime suchen (mind. 3 Buchstaben)..." onkeyup="showSuggestions()" autocomplete="off">
                <div id="autocompleteList" class="autocomplete-list"></div>
            </div>
            <button onclick="addAnime()">Hinzufügen</button>
        </div>

        <div id="animeGrid" class="anime-grid">
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
