<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyAniList - Dashboard</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        
        <header class="app-header">
            <h1>MyAniList</h1>
            <p class="subtitle">Dein persönliches Anime-Streaming-Dashboard</p>
        </header>

        <div class="control-panel">
            <div class="input-section">
                <div class="input-wrapper">
                    <input type="text" id="animeName" placeholder="Anime suchen oder eintippen..." onkeyup="showSuggestions()" autocomplete="off">
                    <div id="autocompleteList" class="autocomplete-list"></div>
                </div>
                <button class="btn-primary" onclick="addAnime()">Hinzufügen</button>
            </div>

            <div class="sort-section">
                <span>Sortieren</span>
                <select id="sortCriteria" onchange="changeSort()">
                    <option value="date_desc">Zuletzt hinzugefügt (Neu -> Alt)</option>
                    <option value="date_asc">Zuerst hinzugefügt (Alt -> Neu)</option>
                    <option value="name_asc">Alphabetisch (A-Z)</option>
                    <option value="name_desc">Alphabetisch (Z-A)</option>
                    <option value="progress_desc">Meister Fortschritt</option>
                    <option value="progress_asc">Wenigster Fortschritt</option>
                </select>
            </div>

            <div class="backup-section" style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn-primary" style="background-color: var(--border-color); padding: 10px 15px; font-size: 13px;" onclick="exportData()">💾 Exportieren</button>
                <label class="btn-primary" style="background-color: var(--border-color); padding: 10px 15px; font-size: 13px; cursor: pointer; margin: 0;">
                    📂 Importieren
                    <input type="file" accept=".json" style="display: none;" onchange="importData(event)">
                </label>
            </div>
        </div>

        <main>
            <div id="animeGrid" class="anime-grid">
                </div>
        </main>

        <section class="recommendations-container">
            <h2>Vorschläge für dich</h2>
            <div id="recommendationsGrid" class="anime-grid">
                </div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
