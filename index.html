<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyAniList</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Meine Anime Liste</h1>
        
        <div class="input-section">
            <input type="text" id="animeName" placeholder="Anime Name (z.B. Jujutsu Kaisen)">
            <input type="number" id="currentEpisode" placeholder="Aktuelle Folge" min="1" value="1">
            <button onclick="addAnime()">Hinzufügen</button>
        </div>

        <div id="animeGrid" class="anime-grid">
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
